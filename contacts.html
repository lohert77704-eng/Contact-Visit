<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакти</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins';background:#020617;color:white}
header{text-align:center;padding:20px}
nav a{color:white;margin:0 10px;text-decoration:none}
form{max-width:420px;margin:50px auto;display:flex;flex-direction:column;gap:15px}
input,textarea{padding:12px;border-radius:10px;border:none}
button{padding:14px;background:linear-gradient(90deg,#3b82f6,#22c55e);border:none;border-radius:12px;color:white}
</style>
</head>
<body>

<header>
<h2>Контакти</h2>
<nav>
<a href="index.html">Головна</a>
<a href="services.html">Послуги</a>
<a href="contacts.html">Контакти</a>
</nav>
</header>

<form onsubmit="sendToTelegram(event)">
<input id="name" type="text" placeholder="Ваше ім'я" required>
<input id="phone" type="tel" placeholder="Телефон" required>
<textarea id="msg" placeholder="Ваше повідомлення"></textarea>
<button type="submit">Відправити заявку</button>
</form>

<script>
function sendToTelegram(e){
 e.preventDefault();
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;
 let msg=document.getElementById('msg').value;
 let text=`Нова заявка:%0AІм'я: ${name}%0AТелефон: ${phone}%0AПовідомлення: ${msg}`;
 window.open(`https://t.me/Artem_Llll?text=${text}`,'_blank');
}
</script>

</body>
</html>
